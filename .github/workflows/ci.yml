name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run tests
        run: python -m unittest discover -s tests -v

      - name: Compile Python sources
        run: python -m compileall -q skill tools tests

      - name: Check extractor syntax
        run: node --check tools/extract_site_data.mjs

  generated-files:
    name: Generated references are current
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Regenerate references
        run: >-
          python tools/build_reference_files.py
          skill/design-lab-prompts/references/catalog.json
          skill/design-lab-prompts

      - name: Reject generated drift
        run: git diff --exit-code
